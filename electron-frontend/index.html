<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cue</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 🔹 Glass Floating Bar -->
    <div class="glass-bar" role="toolbar" aria-label="Cue Controls">
      <button class="glass-btn" id="listen-btn" aria-label="Toggle Listening">
        Listen ⏸
      </button>
      <button class="glass-btn" id="ask-btn" aria-label="Ask Cue">
        Ask ⌘↩
      </button>
      <button class="glass-btn" id="toggle-btn" aria-label="Show or Hide Cue">
        Show/Hide ⌘\\
      </button>
      <button
        class="glass-btn"
        id="menu-btn"
        aria-label="Menu (Coming Soon)"
        disabled
      >
        ⋯
      </button>
    </div>

    <!-- 🔹 Coaching Prompt Box -->
    <div id="prompt-box" class="coaching-box" hidden aria-live="polite"></div>

    <!-- 🔹 Chat UI -->
    <div
      id="chat-window"
      class="chat-ui"
      hidden
      role="dialog"
      aria-label="Cue Chat"
    >
      <div class="chat-header">Cue Chat</div>
      <div class="chat-messages" id="chat-messages" aria-live="polite"></div>
      <div class="chat-input">
        <input
          type="text"
          id="chat-input-box"
          placeholder="Ask Cue something..."
          autocomplete="off"
          aria-label="Chat input"
        />
        <button id="chat-send-btn" aria-label="Send Message">Send</button>
      </div>
    </div>

    <!-- 🔹 Input Prompt Bar -->
    <div id="input-bar" class="input-bar" aria-live="polite">
      Ask about your screen or audio...
    </div>

    <!-- 🔹 Thinking Bar -->
    <div class="thinking-bar" id="thinking-bar" hidden aria-live="assertive">
      <span class="info-icon" aria-hidden="true">ⓘ</span>
      <span class="thinking-text" id="thinking-text">Thinking…</span>
      <span
        class="close-icon"
        role="button"
        tabindex="0"
        aria-label="Close thinking bar"
        onclick="document.getElementById('thinking-bar').hidden = true;"
      >
        ×
      </span>
    </div>

    <!-- 🔹 Insights Bar -->
    <div class="insights-bar" role="complementary" aria-label="Live Insights">
      <div id="insights-content">
        <strong>Current Summary:</strong>
        <span id="summary-text">No content yet...</span>
      </div>
      <div class="insight-controls">
        <button id="live-insights-btn">Live Insights</button>
        <button id="show-transcript-btn">Show Transcript</button>
      </div>
    </div>

    <!-- 🔹 Button Handlers -->
    <script>
      const { ipcRenderer } = window.electron || {};

      document.getElementById("listen-btn")?.addEventListener("click", () => {
        ipcRenderer?.send("toggle-audio-capture");
      });

      document.getElementById("toggle-btn")?.addEventListener("click", () => {
        ipcRenderer?.send("request-hide-window");
      });

      document.getElementById("ask-btn")?.addEventListener("click", () => {
        if (typeof sendChatMessage === "function") sendChatMessage();
      });
    </script>

    <script src="renderer.js"></script>
  </body>
</html>
