<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cue</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 🔹 Glass-Inspired Floating Bar -->
    <div class="glass-bar ultra-minimal liquid-glass" id="main-ui">
      <button
        class="glass-btn"
        id="listen-btn"
        title="Start/Stop Audio Listening"
      >
        <span>Listen</span>
        <div class="ai-status-dot breathing" id="audio-status"></div>
        <div class="keyboard-hint">Space</div>
      </button>
      <button
        class="glass-btn"
        id="monitor-btn"
        title="Toggle AI Screen Monitoring"
      >
        <span>Monitor</span>
        <div class="ai-status-dot breathing" id="monitor-status"></div>
        <div class="keyboard-hint">Ctrl+Shift+M</div>
      </button>
      <button class="glass-btn" id="ask-btn" title="Ask AI a Question">
        <span>Ask</span>
        <div class="keyboard-hint">Ctrl+\</div>
      </button>
      <button
        class="glass-btn"
        id="stealth-btn"
        title="Toggle Stealth Mode (Invisible)"
      >
        <span>Stealth</span>
        <div class="ai-status-dot breathing" id="stealth-status"></div>
        <div class="keyboard-hint">Ctrl+Shift+S</div>
      </button>
    </div>

    <!-- 🥷 Stealth Mode Indicator -->
    <div class="stealth-status hidden" id="stealth-indicator"></div>

    <!-- 🔹 Unified Chat UI -->
    <div id="chat-ui" class="chat-ui" hidden>
      <div class="chat-header">
        <span>Cue Assistant</span>
        <div class="response-controls">
          <button id="copy-btn" title="Copy Transcript">📋</button>
          <button id="close-btn" title="Close">×</button>
        </div>
      </div>
      <div id="chat-messages" class="chat-messages"></div>
      <div class="chat-input">
        <input
          id="chat-ui-input"
          placeholder="Type a message..."
          autocomplete="off"
        />
        <button id="chat-ui-send">Send</button>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
