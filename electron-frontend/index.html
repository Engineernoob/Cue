<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cue</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 🔹 Glass-Inspired Floating Bar -->
    <div class="glass-bar ultra-minimal liquid-glass" id="main-ui">
      <button
        class="glass-btn"
        id="listen-btn"
        title="Start/Stop Audio Listening"
      >
        <span>Listen</span>
        <div class="ai-status-dot breathing" id="audio-status"></div>
        <div class="keyboard-hint">Space</div>
      </button>
      <button
        class="glass-btn"
        id="monitor-btn"
        title="Toggle AI Screen Monitoring"
      >
        <span>Monitor</span>
        <div class="ai-status-dot breathing" id="monitor-status"></div>
        <div class="keyboard-hint">Ctrl+Shift+M</div>
      </button>
      <button class="glass-btn" id="ask-btn" title="Ask AI a Question">
        <span>Ask</span>
        <div class="keyboard-hint">Ctrl+\\</div>
      </button>
      <button
        class="glass-btn"
        id="stealth-btn"
        title="Toggle Stealth Mode (Invisible)"
      >
        <span>Stealth</span>
        <div class="ai-status-dot breathing" id="stealth-status"></div>
        <div class="keyboard-hint">Ctrl+Shift+S</div>
      </button>
    </div>

    <!-- 🥷 Stealth Mode Indicator -->
    <div class="stealth-status hidden" id="stealth-indicator"></div>

    <!-- 🔹 Input Prompt Box -->
    <div id="input-bar" class="input-bar" hidden>
      <input
        type="text"
        id="chat-input-box"
        placeholder="Ask about your screen or audio..."
        autocomplete="off"
      />
      <button id="chat-send-btn" title="Send">↩</button>
    </div>

    <!-- 🔹 Glass-Inspired Response Box -->
    <div
      id="response-box"
      class="response-box glass-morphism smooth-appear"
      hidden
    >
      <div class="response-header">
        <span id="response-status">Cue's Answer:</span>
        <div class="response-controls">
          <button id="copy-btn" title="Copy Response">📋</button>
          <button id="close-btn" title="Close Response">×</button>
        </div>
      </div>
      <div id="response-content" class="response-content">...</div>
    </div>

    <!-- 🔹 Thinking Bar -->
    <div id="thinking-bar" class="thinking-bar" hidden>
      <span id="thinking-text"></span>
      <button class="close-icon">×</button>
    </div>

    <!-- 🔹 Coaching Prompt Box -->
    <div id="prompt-box" class="coaching-box" hidden>
      <!-- dynamically populated -->
    </div>

    <!-- 🔹 Persistent Chat UI -->
    <div class="chat-ui" id="chat-ui" hidden>
      <div class="chat-header">Cue Assistant</div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input">
        <input id="chat-ui-input" type="text" placeholder="Type a message..." />
        <button id="chat-ui-send">Send</button>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
